<script>
// ===== 全局状态 =====
const COLORS = {
  green: '#16a34a', red: '#dc2626', blue: '#2563eb',
  orange: '#ea580c', purple: '#7c3aed', cyan: '#0891b2',
  yellow: '#ca8a04', gray: '#64748b',
};
const AVAILABLE_DATES = ['2026-06-24','2026-06-25','2026-06-26','2026-06-27','2026-06-28','2026-06-29','2026-06-30'];
let ALL_DATA = {};     // 缓存: shared数据 + 当前日期数据
let currentDate = '';  // 当前选中日期
let currentScenario = 'actual'; // 当前场景: actual | spike-baseline | spike
let activeCharts = []; // 当前页面的echarts实例
let currentPage = 'page-profit';

// ===== 工具函数 =====
function timeToHour(t) { const [h,m]=t.split(':').map(Number); return h+m/60; }
function fmt(n,d=0) {
  if (n == null || Number.isNaN(Number(n))) return '--';
  return Number(n).toLocaleString('zh-CN',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function fmtNum(n,d=0) {
  if (n == null || Number.isNaN(Number(n))) return '--';
  return Number(n).toFixed(d);
}
function fmtPct(n) { return (n*100).toFixed(1)+'%'; }

// 读取后端配置的 LMP 预测参数 (fallback 见注释)
function getLMPBiasDecay() { return +(ALL_DATA.storage?.lmp_bias_decay ?? 0.8); }
function getBiasLookback() { return +(ALL_DATA.storage?.bias_lookback ?? 4); }
function getBiasWeightDecay() { return +(ALL_DATA.storage?.bias_weight_decay ?? 0.7); }
function getBiasQuantileZ() { return +(ALL_DATA.storage?.bias_quantile_z ?? 1.28); }

// 计算多时刻加权偏差 (与 src/forecaster.py _weighted_bias 对齐)
function weightedBias(t, daLMP, rtLMP) {
  const lookback = getBiasLookback();
  const wDecay = getBiasWeightDecay();
  const biases = [];
  for (let j = 1; j <= lookback; j++) {
    if (t - j >= 0 && rtLMP[t - j] != null && daLMP[t - j] != null) {
      biases.push(rtLMP[t - j] - daLMP[t - j]);
    }
  }
  if (biases.length === 0) return 0.0;
  if (biases.length === 1 || wDecay <= 0) return biases[0];
  let totalW = 0, sum = 0;
  for (let i = 0; i < biases.length; i++) {
    const w = Math.pow(wDecay, i);
    totalW += w;
    sum += biases[i] * w;
  }
  return sum / totalW;
}

// 计算最近已观测偏差的样本标准差 (与 src/forecaster.py _recent_bias_std 对齐)
function recentBiasStd(t, daLMP, rtLMP) {
  const lookback = getBiasLookback();
  const recent = [];
  for (let i = Math.max(0, t - lookback); i < t; i++) {
    if (rtLMP[i] != null && daLMP[i] != null) {
      recent.push(rtLMP[i] - daLMP[i]);
    }
  }
  if (recent.length < 2) return 0.0;
  const mean = recent.reduce((a, b) => a + b, 0) / recent.length;
  const variance = recent.reduce((a, b) => a + (b - mean) ** 2, 0) / (recent.length - 1);
  return Math.sqrt(variance);
}

// 模拟 src/forecaster.py 的 predict_lmp / predict_lmp_quantiles
// 返回 {forecast, p10, p90}, 其中 forecast 是点预测, p10/p90 仅用于展示
function predictLMPWithInterval(t, H) {
  const da = ALL_DATA.dayAhead;
  const rt = ALL_DATA.realTime;
  const daLMP = da ? da.intervals.map(d => d.lmp_yuan_per_mwh) : [];
  const rtLMP = rt ? rt.intervals.map(d => d.rt_lmp_yuan_per_mwh) : [];
  const T = daLMP.length || rtLMP.length;
  if (!T || H <= 0) return { forecast: [], p10: [], p90: [] };

  const decay = getLMPBiasDecay();
  const z = getBiasQuantileZ();
  const latestBias = weightedBias(t, daLMP, rtLMP);
  const std = recentBiasStd(t, daLMP, rtLMP);

  const forecast = [], p10 = [], p90 = [];
  for (let k = 1; k <= H; k++) {
    const idx = t + k - 1;
    let base;
    if (idx >= T) base = daLMP[T - 1];
    else if (idx < 0) base = daLMP[0];
    else base = daLMP[idx];
    if (base == null) base = rtLMP[t] ?? 0;
    const bias = latestBias * Math.pow(decay, k);
    const fc = Math.round((base + bias) * 100) / 100;
    forecast.push(fc);
    const width = z * std * Math.sqrt(k);
    p10.push(Math.round((fc - width) * 100) / 100);
    p90.push(Math.round((fc + width) * 100) / 100);
  }
  return { forecast, p10, p90 };
}

// 兼容旧接口: 仅返回点预测
function predictLMP(t, H) {
  return predictLMPWithInterval(t, H).forecast;
}

async function loadJSON(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${url}`);
  return resp.json();
}

// 加载共享数据 (不随日期变化的)
async function loadSharedData() {
  const urls = {
    storage: '../data/input/storage_params.json',
    agc:     '../data/input/agc_performance.json',
    settle:  '../data/input/settlement_params.json',
    vpp:     '/api/vpp/configs',
  };
  const results = await Promise.allSettled(
    Object.entries(urls).map(([k, url]) => loadJSON(url).then(d => ({[k]: d})))
  );
  for (const r of results) {
    if (r.status === 'fulfilled') Object.assign(ALL_DATA, r.value);
    else console.warn('Failed:', r.reason);
  }
  populateVppSelector();
}

function populateVppSelector() {
  const select = document.getElementById('vpp-selector');
  if (!select || !ALL_DATA.vpp) return;
  const current = select.value || 'overall';
  let html = '<option value="overall">整体聚合</option>';
  for (const c of ALL_DATA.vpp.configs || []) {
    html += `<option value="${c.config_id}">${c.vpp_name}</option>`;
  }
  select.innerHTML = html;
  select.value = current;
  select.addEventListener('change', async () => {
    await loadVppScenarioData();
    if (currentPage === 'page-storage') renderStoragePage();
    if (currentPage === 'page-profit') renderProfitPage();
    if (currentPage === 'page-dayahead') renderDayAheadPage();
    updateHeader();
    updateAgcMargin();
  });
}

function getSelectedVppConfig() {
  if (!ALL_DATA.vpp) return null;
  const id = document.getElementById('vpp-selector')?.value || 'overall';
  if (id === 'overall') return ALL_DATA.vpp.overall;
  return (ALL_DATA.vpp.configs || []).find(c => String(c.config_id) === id) || ALL_DATA.vpp.overall;
}

function getSelectedVppName() {
  const cfg = getSelectedVppConfig();
  return cfg?.vpp_name || '整体聚合';
}

// 加载指定日期和场景的数据
async function loadDateScenarioData(dateStr, scenario = 'actual') {
  let dailyUrl, realTimeUrl, dayAheadUrl;
  if (scenario === 'spike-baseline') {
    dailyUrl = '../data/output/test_lmp_spike_baseline.json';
    realTimeUrl = '../data/output/test_lmp_spike_baseline_dispatch.json';
    dayAheadUrl = `../data/input/${dateStr}_day_ahead_market.json`;
  } else if (scenario === 'spike') {
    dailyUrl = '../data/output/test_lmp_spike_spike.json';
    realTimeUrl = '../data/output/test_lmp_spike_spike_dispatch.json';
    dayAheadUrl = `../data/input/${dateStr}_day_ahead_market.json`;
  } else if (scenario === 'highnoise') {
    dailyUrl = `../data/output/${dateStr}_highnoise_daily_result.json`;
    realTimeUrl = `../data/output/${dateStr}_highnoise_real_time_dispatch.json`;
    dayAheadUrl = `../data/input/${dateStr}_highnoise_day_ahead_market.json`;
  } else if (scenario === 'extremenoise') {
    dailyUrl = `../data/output/${dateStr}_extremenoise_daily_result.json`;
    realTimeUrl = `../data/output/${dateStr}_extremenoise_real_time_dispatch.json`;
    dayAheadUrl = `../data/input/${dateStr}_extremenoise_day_ahead_market.json`;
  } else {
    dailyUrl = `../data/output/${dateStr}_daily_result.json`;
    realTimeUrl = `../data/output/${dateStr}_real_time_dispatch.json`;
    dayAheadUrl = `../data/input/${dateStr}_day_ahead_market.json`;
  }

  const urls = {
    daily:    dailyUrl,
    dayAhead: dayAheadUrl,
    realTime: realTimeUrl,
  };
  const results = await Promise.allSettled(
    Object.entries(urls).map(([k, url]) => loadJSON(url).then(d => ({[k]: d})))
  );
  for (const r of results) {
    if (r.status === 'fulfilled') Object.assign(ALL_DATA, r.value);
    else console.warn('Failed:', r.reason);
  }
  currentDate = dateStr;
  currentScenario = scenario;
}

// 兼容旧接口
async function loadDateData(dateStr) {
  return loadDateScenarioData(dateStr, currentScenario);
}

// 根据当前选中的 VPP 配置加载对应的默认运营数据
async function loadVppScenarioData() {
  const dateStr = document.getElementById('date-selector')?.value || currentDate;
  const configId = document.getElementById('vpp-selector')?.value || 'overall';

  if (configId === 'overall') {
    // 整体聚合：使用默认输出文件
    await loadDateScenarioData(dateStr, currentScenario);
    return;
  }

  const cfg = getSelectedVppConfig();
  if (!cfg) return;

  try {
    const resp = await fetch('/api/backtest/single_day', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        date: dateStr,
        agc_ratio: cfg.agc_ratio,
        mode: 'scale',
        use_mpc: false,
        agc_source: 'historical',
        config_id: configId,
        initial_soc: cfg.initial_soc,
      }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    ALL_DATA.daily = data.daily_result;
    ALL_DATA.realTime = data.real_time;
    ALL_DATA.dayAhead = data.day_ahead;
    currentDate = dateStr;
  } catch (e) {
    console.error('[VPP数据加载] 失败:', e);
    await loadDateScenarioData(dateStr, currentScenario);
  }
}

  const dom = document.getElementById(domId);

    for(let h=0;h<24;h++){
      let sum=0;
      for(let q=0;q<4;q++) sum+=lmpData[h*4+q];
      hourlyAvg.push(sum/4);
    }
    const maxP=Math.max(...hourlyAvg), minP=Math.min(...hourlyAvg);
    const hLabels=Array.from({length:24},(_,i)=>`${i}:00`);
    chart.setOption({
      tooltip:{trigger:'axis',formatter:p=>`<b>${p[0].axisValue}</b><br/>均价: ${p[0].value.toFixed(1)} 元/MWh<br/>峰谷差: ${(maxP-minP).toFixed(1)} 元/MWh`},
      grid:{left:60,right:30,top:20,bottom:20},
      xAxis:{type:'category',data:hLabels,axisLabel:{color:'#64748b',fontSize:10,interval:2}},
      yAxis:{type:'value',name:'元/MWh',nameTextStyle:{color:'#64748b'},axisLabel:{color:'#64748b'},splitLine:{lineStyle:{color:'rgba(37,99,235,0.12)'}}},
      series:[{
        type:'bar',data:hourlyAvg,
        itemStyle:{color:function(p){return p.value===maxP?COLORS.red:p.value===minP?COLORS.green:COLORS.blue;}},
        barWidth:'60%',
        label:{show:true,position:'top',color:'#64748b',fontSize:9,formatter:p=>p.value===maxP||p.value===minP?p.value.toFixed(0):''},
      }]
    });
  })();

  // 表格
  (function(){
    const step=4;let html=`<table><thead><tr><th>时段</th><th>LMP(元/MWh)</th><th>充电(MW)</th><th>放电(MW)</th><th>AGC容量</th><th>AGC报价</th></tr></thead><tbody>`;
    for(let i=0;i<96;i+=step){
      const r=intervals[i];
      html+=`<tr><td>${r.time}</td><td>${r.lmp_yuan_per_mwh.toFixed(1)}</td><td class="pos">${r.win_charge_mw.toFixed(1)}</td><td class="neg">${r.win_discharge_mw.toFixed(1)}</td><td>${adjAgcCap[i].toFixed(1)}</td><td>${adjAgcPrice[i].toFixed(2)}</td></tr>`;
    }
    html+='</tbody></table>';
    document.getElementById('da-table').innerHTML=html;
  })();
}

// 计算实时运行数据数组 (收益看板和实时看板共用)
// 现在所有核心数据(rt_lmp/actual_charge/actual_discharge/actual_agc/soc)均已由Python后端生成,
// 本函数仅做数据整理和日前-实时偏差计算, 不再做SOC仿真或随机扰动。
function computeRealTimeData() {
  const rt = ALL_DATA.realTime;
  const da = ALL_DATA.dayAhead;
  if (!rt) return null;
  const intervals = rt.intervals;
  const times = intervals.map(d=>d.time);

  // 直接使用后端数据; actual_charge/discharge 已是套利+AGC的总功率
  const rtLMP = intervals.map(d => +(d.rt_lmp_yuan_per_mwh).toFixed(2));
  const chg = intervals.map(d => d.actual_charge_mw);
  const dis = intervals.map(d => d.actual_discharge_mw);
  const arbChg = intervals.map(d => d.arbitrage_charge_mw ?? 0);
  const arbDis = intervals.map(d => d.arbitrage_discharge_mw ?? 0);
  const agcChg = intervals.map(d => d.agc_charge_mw ?? 0);
  const agcDis = intervals.map(d => d.agc_discharge_mw ?? 0);
  const agc = intervals.map(d => d.actual_agc_mw);
  const mileage = intervals.map(d => d.agc_mileage_mw);
  const socPath = intervals.map(d => +(d.soc * 100).toFixed(2));

  const daIntervals = da ? da.intervals : [];
  const lmpDev = da ? times.map((_,i)=>rtLMP[i]-(daIntervals[i]?.lmp_yuan_per_mwh||rtLMP[i])) : [];
  const chgDev = da ? times.map((_,i)=>chg[i]-(daIntervals[i]?.win_charge_mw||chg[i])) : [];
  const disDev = da ? times.map((_,i)=>dis[i]-(daIntervals[i]?.win_discharge_mw||dis[i])) : [];
  return { rt, intervals, times, rtLMP, chg, dis, arbChg, arbDis, agcChg, agcDis, agc, mileage, socPath, daIntervals, lmpDev, chgDev, disDev };
}

function getSelectedStorageParams() {
  const base = ALL_DATA.storage;
  if (!base || !ALL_DATA.vpp) return base;
  const cfg = getSelectedVppConfig() || ALL_DATA.vpp.overall;
  if (!cfg) return base;
  return { ...base, ...cfg, name: cfg.vpp_name || base.name };
}

function updateAgcMargin() {
  const ratioEl = document.getElementById('sbt-ratio');
  const marginEl = document.getElementById('sbt-agc-margin');
  if (!ratioEl || !marginEl) return;
  const ratio = parseFloat(ratioEl.value) || 0;
  const sp = getSelectedStorageParams() || ALL_DATA.storage || {};
  const marginMW = (sp.rated_power_mw || 0) * ratio;
  const baseRatio = sp.rated_power_mw > 0 ? (sp.agc_max_capacity_mw / sp.rated_power_mw) : 0;
  const socReserve = baseRatio > 0 ? (sp.agc_soc_reserve || 0) * (ratio / baseRatio) : 0;
  marginEl.textContent = `| AGC容量: ${(ratio * 100).toFixed(1)}% (${fmt(marginMW, 2)} MW) | SOC裕量: ${(socReserve * 100).toFixed(1)}%`;
}

    </div>
    <div class="card">
      <div class="card-title">📋 回测结果明细</div>

  const daPower = daPlan.map(it => round(it.discharge_mw - it.charge_mw, 2));
  // 实际运行功率
  const rtPower = (daily.intervals || []).map(r => r.net_power_mw);
  // 日前计划SOC

  // 实际SOC

    grid: { left: 60, right: 60, top: 40, bottom: 60 },

      { type: 'value', name: 'SOC(%)', min: 0, max: 100, nameTextStyle: { color: '#64748b' }, axisLabel: { color: '#64748b', formatter: v => v.toFixed(0) + '%' }, splitLine: { show: false } },
    ],

function round(val, digits) {
  const factor = Math.pow(10, digits);
  return Math.round(val * factor) / factor;
}

// 根据调频比例计算对应的 SOC 软边界（与后端 _build_scenario_storage 对齐）
function getSoftBoundsForRatio(ratio) {
  const sp = ALL_DATA.storage || {};
  const baseRatio = sp.rated_power_mw > 0 ? (sp.agc_max_capacity_mw / sp.rated_power_mw) : 0;
  const reserve = (sp.agc_soc_reserve || 0);
  const newReserve = baseRatio > 0 ? reserve * (ratio / baseRatio) : reserve;
  const halfRange = ((sp.soc_max ?? 1) - (sp.soc_min ?? 0)) / 2.0;
  const effectiveReserve = Math.min(newReserve, halfRange * 0.999);
  return {
    soc_soft_min: (sp.soc_min ?? 0) + effectiveReserve,
    soc_soft_max: (sp.soc_max ?? 1) - effectiveReserve,
  };
}

function getBidOverride(date, ratio) {
  const ratioKey = String(ratio);
  if (date) {
    if (!BATCH_DAILY_OVERRIDES[date]) BATCH_DAILY_OVERRIDES[date] = { lmp: null, bids: {} };
    if (!BATCH_DAILY_OVERRIDES[date].bids) BATCH_DAILY_OVERRIDES[date].bids = {};
    if (!BATCH_DAILY_OVERRIDES[date].bids[ratioKey]) {
      BATCH_DAILY_OVERRIDES[date].bids[ratioKey] = { source: 'optimize', power_plan: null };
    }
    return BATCH_DAILY_OVERRIDES[date].bids[ratioKey];
  }
  if (!SINGLE_OVERRIDES.bids) SINGLE_OVERRIDES.bids = {};
  if (!SINGLE_OVERRIDES.bids[ratioKey]) {
    SINGLE_OVERRIDES.bids[ratioKey] = { source: 'optimize', power_plan: null };
  }
  return SINGLE_OVERRIDES.bids[ratioKey];
}

// 设置指定 date + ratio 的日前中标覆盖
function setBidOverride(date, ratio, bid) {
  const ratioKey = String(ratio);
  if (date) {
    if (!BATCH_DAILY_OVERRIDES[date]) BATCH_DAILY_OVERRIDES[date] = { lmp: null, bids: {} };
    if (!BATCH_DAILY_OVERRIDES[date].bids) BATCH_DAILY_OVERRIDES[date].bids = {};
    BATCH_DAILY_OVERRIDES[date].bids[ratioKey] = bid;
  } else {
    SINGLE_OVERRIDES.bids[ratioKey] = bid;
  }
}

// 获取某个日期下所有已配置自定义曲线的 ratio 列表
function getConfiguredBidRatios(date) {
  if (date) {
    return Object.keys(BATCH_DAILY_OVERRIDES[date]?.bids || {})
      .filter(r => BATCH_DAILY_OVERRIDES[date].bids[r]?.source === 'custom');
  }
  return Object.keys(SINGLE_OVERRIDES.bids || {})
    .filter(r => SINGLE_OVERRIDES.bids[r]?.source === 'custom');
}

// 把旧的单条 bid 结构迁移到 per-ratio 结构（用于兼容已保存的回测）
function migrateBidOverrides() {
  if (SINGLE_OVERRIDES.bid) {
    const old = SINGLE_OVERRIDES.bid;
    if (!SINGLE_OVERRIDES.bids) SINGLE_OVERRIDES.bids = {};
    if (old.power_plan && Object.keys(SINGLE_OVERRIDES.bids).length === 0) {
      SINGLE_OVERRIDES.bids['default'] = { source: old.source, power_plan: old.power_plan };
    }
    delete SINGLE_OVERRIDES.bid;
  }
  for (const date in BATCH_DAILY_OVERRIDES) {
    if (BATCH_DAILY_OVERRIDES[date].bid) {
      const old = BATCH_DAILY_OVERRIDES[date].bid;
      if (!BATCH_DAILY_OVERRIDES[date].bids) BATCH_DAILY_OVERRIDES[date].bids = {};
      if (old.power_plan && Object.keys(BATCH_DAILY_OVERRIDES[date].bids).length === 0) {
        BATCH_DAILY_OVERRIDES[date].bids['default'] = { source: old.source, power_plan: old.power_plan };
      }
      delete BATCH_DAILY_OVERRIDES[date].bid;
    }
  }
}

async function loadDayAheadOptimizeForEditor(date, ratio, initialSoc) {
  const key = `${date}_${ratio}_${initialSoc}`;
  if (DAY_AHEAD_OPTIMIZE_CACHE[key]) return DAY_AHEAD_OPTIMIZE_CACHE[key];
  try {
    const resp = await fetch('/api/day_ahead/optimize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date, agc_ratio: ratio, initial_soc: initialSoc }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    DAY_AHEAD_OPTIMIZE_CACHE[key] = data;
    return data;
  } catch (e) {
    console.warn('加载日前优化结果失败:', e);
    return null;
  }
}

function getDayAheadOptimizeCache(date, ratio, initialSoc) {
  const key = `${date}_${ratio}_${initialSoc}`;
  return DAY_AHEAD_OPTIMIZE_CACHE[key] || null;

function getBatchCalendarDays(year, month) {
  const firstDay = new Date(year, month - 1, 1);
  const lastDay = new Date(year, month, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekday = firstDay.getDay();
  const days = [];
  for (let i = 0; i < startWeekday; i++) days.push(null);
  for (let d = 1; d <= daysInMonth; d++) days.push(d);
  return days;
}

function formatBatchDate(year, month, day) {
  return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
}

function addBatchDate(date) {
  if (BATCH_SELECTED_DATES.includes(date)) return;
  BATCH_SELECTED_DATES.push(date);
  BATCH_SELECTED_DATES.sort();
  if (!BATCH_DAILY_CONFIGS[date]) {
    BATCH_DAILY_CONFIGS[date] = {
      agc_source: 'historical',
      commands: null,
      hourly: true,
      seed: 42,
      initial_soc_choice: 'previous',
      initial_soc_value: null
    };
  }
  renderBatchDateCards();
  renderBatchCalendar();
}

function removeBatchDate(date) {
  BATCH_SELECTED_DATES = BATCH_SELECTED_DATES.filter(d => d !== date);
  renderBatchDateCards();
  renderBatchCalendar();
}

function toggleBatchDate(date) {
  if (BATCH_SELECTED_DATES.includes(date)) removeBatchDate(date);
  else addBatchDate(date);
}

function changeBatchCalendarMonth(delta) {
  batchCalendarMonth += delta;
  if (batchCalendarMonth > 12) { batchCalendarMonth = 1; batchCalendarYear++; }
  else if (batchCalendarMonth < 1) { batchCalendarMonth = 12; batchCalendarYear--; }
  renderBatchCalendar();
}

function renderBatchCalendar() {
  const container = document.getElementById('batch-calendar');
  if (!container) return;
  const year = batchCalendarYear, month = batchCalendarMonth;
  const days = getBatchCalendarDays(year, month);
  const weekdays = ['日','一','二','三','四','五','六'];
  container.innerHTML = `
    <div class="batch-cal-header">
      <button onclick="changeBatchCalendarMonth(-1)">‹</button>
      <span style="font-weight:600;color:#1e293b;">${year}年 ${month}月</span>
      <button onclick="changeBatchCalendarMonth(1)">›</button>
    </div>
    <div class="batch-cal-grid">
      ${weekdays.map(w => `<div class="batch-cal-weekday">${w}</div>`).join('')}
      ${days.map(d => {
        if (!d) return `<div class="batch-cal-day"></div>`;
        const date = formatBatchDate(year, month, d);
        const available = AVAILABLE_DATES.includes(date);
        const selected = BATCH_SELECTED_DATES.includes(date);
        let cls = 'batch-cal-day';
        if (selected) cls += ' selected';
        else if (available) cls += ' available';
        const onclick = available ? `onclick="toggleBatchDate('${date}')"` : '';
        return `<div class="${cls}" ${onclick}>${d}</div>`;
      }).join('')}
    </div>

}

      dayCfg.commands = cfg.commands.slice();
    } else if (cfg.agc_source === 'random') {
      dayCfg.hourly = cfg.hourly;
      dayCfg.seed = cfg.seed;
    }
    if (cfg.initial_soc_choice === 'custom' && cfg.initial_soc_value != null) {
      dayCfg.initial_soc = parseFloat(cfg.initial_soc_value);
    }
    daily_agc_configs[date] = dayCfg;

    const lmp = BATCH_DAILY_OVERRIDES[date]?.lmp;
    if (lmp?.da_values?.length === 96 || lmp?.rt_values?.length === 96) {
      daily_lmp_overrides[date] = {
        da_source: lmp.da_values?.length === 96 ? 'custom' : 'historical',
        da_values: lmp.da_values?.length === 96 ? lmp.da_values.slice() : undefined,
        rt_source: lmp.rt_values?.length === 96 ? 'custom' : 'historical',
        rt_values: lmp.rt_values?.length === 96 ? lmp.rt_values.slice() : undefined,
      };
    }
  });

  if (hasError) return null;
  return { dates: BATCH_SELECTED_DATES, agc_ratios, mode, use_mpc, initial_soc, daily_agc_configs, daily_lmp_overrides };
}

function renderBatchResult() {

async function runBatchBacktest() {
  if (BATCH_SELECTED_DATES.length === 0) { alert('请至少选择一个日期'); return; }
  const payload = buildBatchPayload();
  if (!payload) return;
  if (payload.agc_ratios.length === 0) { alert('请至少输入一个调频比例'); return; }

  const resultArea = document.getElementById('batch-result');
  resultArea.innerHTML = '<div class="card full-width"><div class="loading">⏳ 批量回测运行中，请稍候...</div></div>';

  try {
    const resp = await fetch('/api/backtest/batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    BATCH_RESULT = data;
    renderBatchResult();
  } catch (e) {
    resultArea.innerHTML = `<div class="card full-width"><div class="error">批量回测失败: ${e.message}</div></div>`;
  }
}

async function refreshBatchBacktestList() {
  try {
    const resp = await fetch('/api/batch-backtest/list');
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    BATCH_SAVED_LIST = data.items || [];
    const sel = document.getElementById('batch-load-select');
    if (!sel) return;
    sel.innerHTML = '<option value="">-- 读取回测 --</option>';
    BATCH_SAVED_LIST.forEach(item => {
      const opt = document.createElement('option');
      opt.value = JSON.stringify({ type: item.type, file: item.file });
      opt.textContent = item.label;
      sel.appendChild(opt);
    });
  } catch (e) {
    console.warn('加载回测列表失败:', e);
  }
}

async function saveBatchBacktest() {
  if (!BATCH_RESULT) { alert('请先运行回测再保存'); return; }
  const name = prompt('请输入回测名称:', `批量回测_${BATCH_RESULT.start_date}_${BATCH_RESULT.end_date}`);
  if (!name || !name.trim()) return;

  const payload = buildBatchPayload();
  const daily = JSON.parse(JSON.stringify(BATCH_DAILY_CONFIGS));
  BATCH_SELECTED_DATES.forEach(date => {
    const ov = BATCH_DAILY_OVERRIDES[date];
    if (ov) {
      if (ov.lmp?.da_values?.length === 96 || ov.lmp?.rt_values?.length === 96) {
        daily[date].lmp_overrides = JSON.parse(JSON.stringify(ov.lmp));
      }
      if (ov.bids && Object.keys(ov.bids).length > 0) {
        daily[date].bid_overrides = JSON.parse(JSON.stringify(ov.bids));
      }
    }
  });
  const saveData = {
    meta: { name: name.trim() },
    settings: {
      dates: BATCH_SELECTED_DATES,
      global: {
        agc_ratios: payload.agc_ratios,
        mode: payload.mode,
        use_mpc: payload.use_mpc,
        initial_soc: payload.initial_soc,
      },
      daily,
    },
    result: BATCH_RESULT,
  };

  try {
    const resp = await fetch('/api/batch-backtest/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(saveData),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    alert('保存成功');
    await refreshBatchBacktestList();
  } catch (e) {
    alert('保存失败: ' + e.message);
  }
}

async function loadBatchBacktest() {
  const sel = document.getElementById('batch-load-select');
  if (!sel || !sel.value) { alert('请选择一个回测'); return; }
  const item = JSON.parse(sel.value);

  try {
    const resp = await fetch(`/api/batch-backtest/load?type=${item.type}&file=${encodeURIComponent(item.file)}`);
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    if (item.type === 'batch' && data.settings) {
      BATCH_SELECTED_DATES = (data.settings.dates || []).slice();
      BATCH_DAILY_CONFIGS = JSON.parse(JSON.stringify(data.settings.daily || {}));
      BATCH_DAILY_OVERRIDES = {};
      BATCH_SELECTED_DATES.forEach(date => {
        const dayCfg = BATCH_DAILY_CONFIGS[date];
        if (!dayCfg) return;
        const ov = { lmp: null, bids: {} };
        if (dayCfg.lmp_overrides) {
          ov.lmp = JSON.parse(JSON.stringify(dayCfg.lmp_overrides));
          delete dayCfg.lmp_overrides;
        }
        if (dayCfg.bid_overrides) {
          // 兼容旧版单条 bid 结构
          if (dayCfg.bid_overrides.source !== undefined) {
            ov.bids['default'] = JSON.parse(JSON.stringify(dayCfg.bid_overrides));
          } else {
            ov.bids = JSON.parse(JSON.stringify(dayCfg.bid_overrides));
          }
          delete dayCfg.bid_overrides;
        }
        if (ov.lmp || Object.keys(ov.bids).length > 0) BATCH_DAILY_OVERRIDES[date] = ov;
      });
      if (BATCH_SELECTED_DATES.length > 0) {
        const [y, m] = BATCH_SELECTED_DATES[0].split('-').map(Number);
        batchCalendarYear = y;
        batchCalendarMonth = m;
      }
      const g = data.settings.global || {};
      document.getElementById('batch-ratios').value = (g.agc_ratios || [0.3]).join(',');
      document.getElementById('batch-mode').value = g.mode || 'scale';
      document.getElementById('batch-rt-mode').value = g.use_mpc ? 'mpc' : 'hindsight';
      document.getElementById('batch-initial-soc').value = g.initial_soc != null ? g.initial_soc : 0.5;
      BATCH_RESULT = data.result || null;
    } else {
      BATCH_RESULT = data;
    }

    renderBatchCalendar();
    renderBatchDateCards();
    renderBatchResult();
  } catch (e) {
    alert('读取失败: ' + e.message);
  }
}

async function openAgcCurveModal(forDate = null) {
  currentBatchAgcDate = forDate;
  document.getElementById('agc-modal').classList.add('active');
  if (!window._manualAgcCommands || window._manualAgcCommands.length !== 96) {
    window._manualAgcCommands = new Array(96).fill(0.0);
  }
  agcEditorHourly = document.getElementById('agc-editor-hourly').checked;
  renderAgcEditorInputs();
  updateAgcChart();
  await refreshAgcCurveList();
}

function closeAgcCurveModal() {
  document.getElementById('agc-modal').classList.remove('active');
  if (agcEditorChart) {
    agcEditorChart.destroy();
    agcEditorChart = null;
  }
}

function renderAgcEditorInputs() {
  const container = document.getElementById('agc-editor-inputs');
  agcEditorHourly = document.getElementById('agc-editor-hourly').checked;
  const n = agcEditorHourly ? 24 : 96;
  let html = '';
  for (let i = 0; i < n; i++) {
    const label = agcEditorHourly ? `${i}:00` : window._manualAgcCommands[i]?.time || ALL_DATA.realTime?.intervals[i]?.time || `${Math.floor(i/4)}:${(i%4)*15}`;
    const idx = agcEditorHourly ? i * 4 : i;
    const val = window._manualAgcCommands[idx] || 0;
    html += `
      <div class="agc-hour-item">
        <div class="h-label">${label}</div>
        <input type="number" step="0.1" data-idx="${i}" value="${val.toFixed(2)}" oninput="onAgcInputChange(this)">
      </div>`;
  }
  container.innerHTML = html;
}

function onAgcInputChange(input) {
  const i = parseInt(input.dataset.idx, 10);
  let v = parseFloat(input.value) || 0;
  const maxCap = ALL_DATA.storage?.agc_max_capacity_mw ?? 30;
  v = Math.max(-maxCap, Math.min(maxCap, v));
  input.value = v.toFixed(2);
  if (agcEditorHourly) {
    for (let k = 0; k < 4; k++) window._manualAgcCommands[i * 4 + k] = v;
  } else {
    window._manualAgcCommands[i] = v;
  }
  updateAgcChart();
}

function setAgcValueAt(index, value) {
  const maxCap = ALL_DATA.storage?.agc_max_capacity_mw ?? 30;
  value = Math.max(-maxCap, Math.min(maxCap, value));
  if (agcEditorHourly) {
    const base = index * 4;
    for (let k = 0; k < 4; k++) window._manualAgcCommands[base + k] = value;
  } else {
    window._manualAgcCommands[index] = value;
  }
}

function updateAgcChart() {
  const canvas = document.getElementById('agc-editor-chart');
  if (!canvas) return;
  const fullData = window._manualAgcCommands || new Array(96).fill(0);
  const maxCap = ALL_DATA.storage?.agc_max_capacity_mw ?? 30;

  let labels, displayData;
  if (agcEditorHourly) {

function randomFillAgcEditor() {
  const sp = ALL_DATA.storage || {};
  // 使用回测面板中选定的调频比例计算 AGC 容量上限
  const ratioInput = document.getElementById('sbt-ratio');
  const ratio = ratioInput ? parseFloat(ratioInput.value) : (sp.agc_max_capacity_mw / sp.rated_power_mw || 0.1);
  const maxCap = (sp.rated_power_mw || 30) * ratio;
  const seed = Math.floor(Math.random() * 100000);
  // 简单伪随机，按小时或15分钟
  const rng = seededRandom(seed);
  const n = agcEditorHourly ? 24 : 96;
  let prev = 0;
  for (let i = 0; i < n; i++) {
    let cmd = 0;
    // 只有 10% 概率生成非零 AGC 指令，其余时段为 0
    if (rng() < 0.10) {
      // 在 [-maxCap, maxCap] 内按带自相关的分布生成
      cmd = 0.5 * prev + (rng() - 0.5) * maxCap;
      cmd = Math.max(-maxCap, Math.min(maxCap, cmd));
    }
    if (agcEditorHourly) {
      for (let k = 0; k < 4; k++) window._manualAgcCommands[i * 4 + k] = cmd;
    } else {
      window._manualAgcCommands[i] = cmd;
    }
    prev = cmd;
  }
  renderAgcEditorInputs();
  updateAgcChart();
}

function seededRandom(seed) {
  return function() {
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  };
}

function clearAgcEditor() {
  window._manualAgcCommands = new Array(96).fill(0.0);

}

async function loadAgcCurve() {
  const name = document.getElementById('agc-load-select').value;

  try {
    const resp = await fetch('/api/agc/load?name=' + encodeURIComponent(name));
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    let cmds = (data.commands || []).map(v => parseFloat(v) || 0);
    const hourly = !!data.hourly;
    if (hourly && cmds.length === 24) {
      // 24 点按小时重复为 96 点
      cmds = cmds.flatMap(v => [v, v, v, v]);
    }
    if (cmds.length < 96) {
      cmds = cmds.concat(new Array(96 - cmds.length).fill(0));

    document.getElementById('agc-editor-hourly').checked = hourly;

// 根据自定义充放电功率曲线（正=放电，负=充电）模拟日前 SOC 轨迹
function computeSocFromPowerPlan(powerPlan, initialSoc, storage) {
  const capacity = storage.rated_capacity_mwh;
  const hours = 0.25;
  const effC = storage.charging_efficiency;
  const effD = storage.discharging_efficiency;
  const selfDischargeRate = storage.self_discharge_rate;
  const socMin = storage.soc_min;
  const socMax = storage.soc_max;
  let soc = initialSoc;
  const socList = [];
  for (const p of powerPlan) {
    const c = Math.max(0, -p);
    const d = Math.max(0, p);
    const selfDischarge = selfDischargeRate * hours * capacity;
    const chargeDc = c * hours * effC;
    const dischargeDc = d * hours / effD;
    soc = soc + (chargeDc - dischargeDc - selfDischarge) / capacity;
    soc = Math.max(socMin, Math.min(socMax, soc));
    socList.push(soc);
  }
  return socList;
}

function validateSocBounds(socList, storage) {
  const min = storage.soc_soft_min;
  const max = storage.soc_soft_max;
  for (let i = 0; i < socList.length; i++) {
    if (socList[i] < min - 1e-6 || socList[i] > max + 1e-6) {
      return { valid: false, index: i, soc: socList[i], min, max };
    }
  }
  return { valid: true };
}

function validateSocBoundsForRatio(socList, ratio) {
  const bounds = getSoftBoundsForRatio(ratio);
  for (let i = 0; i < socList.length; i++) {
    if (socList[i] < bounds.soc_soft_min - 1e-6 || socList[i] > bounds.soc_soft_max + 1e-6) {
      return { valid: false, index: i, soc: socList[i], min: bounds.soc_soft_min, max: bounds.soc_soft_max };
    }
  }
  return { valid: true };
}

function getEditorInitialSoc(date) {
  const storage = ALL_DATA.storage || {};
  if (!date) {
    const el = document.getElementById('sbt-initial-soc');
    return el ? parseFloat(el.value) : (storage.initial_soc ?? 0.5);
  }
  const cfg = BATCH_DAILY_CONFIGS[date];
  if (cfg?.initial_soc_choice === 'custom' && cfg.initial_soc_value != null) {
    return parseFloat(cfg.initial_soc_value);
  }
  return storage.initial_soc ?? 0.5;
}

function initCurveEditorData(type, date) {
  const storage = getCurveStorage(type, date);
  const baseDA = ALL_DATA.dayAhead;
  const baseRT = ALL_DATA.realTime;

  function ensureArray(key, fallbackFn) {
    if (!storage[key] || storage[key].length !== 96) {
      storage[key] = fallbackFn();
    }
  }

  if (type === 'da_lmp') {
    if (storage.da_source !== 'custom') storage.da_source = 'custom';
    ensureArray('da_values', () => baseDA ? baseDA.intervals.map(d => d.lmp_yuan_per_mwh) : new Array(96).fill(0));
  } else if (type === 'rt_lmp') {
    if (storage.rt_source !== 'custom') storage.rt_source = 'custom';
    ensureArray('rt_values', () => baseRT ? baseRT.intervals.map(d => d.rt_lmp_yuan_per_mwh) : new Array(96).fill(0));
  } else if (type === 'da_bid') {
    if (storage.source === 'custom') {
      ensureArray('power_plan', () => baseDA ? baseDA.intervals.map(d => d.win_discharge_mw - d.win_charge_mw) : new Array(96).fill(0));
    }
  }
}

function updateCurveSocStatus() {
  const statusEl = document.getElementById('curve-soc-status');
  if (CURVE_EDITOR_TYPE !== 'da_bid') {
    statusEl.textContent = '';
    return;
  }
  const storage = getCurveStorage('da_bid', CURVE_EDITOR_DATE);
  if (storage.source !== 'custom' || !storage.power_plan || storage.power_plan.length !== 96) {
    statusEl.textContent = '';
    return;
  }
  const storageParams = ALL_DATA.storage || {};
  const initialSoc = getEditorInitialSoc(CURVE_EDITOR_DATE);
  const socList = computeSocFromPowerPlan(storage.power_plan, initialSoc, storageParams);
  const ratio = CURVE_EDITOR_RATIO || (CURVE_EDITOR_DATE ? getCurrentBatchRatios()[0] : getCurrentSingleRatio());
  const v = validateSocBoundsForRatio(socList, ratio);
  if (v.valid) {
    const minSoc = Math.min(...socList);
    const maxSoc = Math.max(...socList);
    statusEl.innerHTML = `<span style="color:#16a34a;">✓ SOC 轨迹在软边界内 [${minSoc.toFixed(3)}, ${maxSoc.toFixed(3)}]</span>`;
  } else {
    statusEl.innerHTML = `<span style="color:#dc2626;">✗ 第 ${v.index + 1} 点 SOC=${v.soc.toFixed(4)} 超出软边界 [${v.min}, ${v.max}]</span>`;
  }
}

    return;
  }

  // 日前中标自定义模式：双列紧凑输入，功率与SOC均可手动编辑
  if (CURVE_EDITOR_TYPE === 'da_bid' && storage.source === 'custom') {
    const storageParams = ALL_DATA.storage || {};
    const initialSoc = getEditorInitialSoc(CURVE_EDITOR_DATE);
    const socList = computeSocFromPowerPlan(storage.power_plan, initialSoc, storageParams);
    const ratio = CURVE_EDITOR_RATIO || (CURVE_EDITOR_DATE ? getCurrentBatchRatios()[0] : getCurrentSingleRatio());
    const bounds = getSoftBoundsForRatio(ratio);
    const half = 48;
    let html = '<div class="curve-input-grid">';
    for (let col = 0; col < 2; col++) {
      html += '<div class="curve-input-col">';
      for (let i = col * half; i < (col + 1) * half; i++) {
        const soc = socList[i];
        const socColor = soc < bounds.soc_soft_min - 1e-9 || soc > bounds.soc_soft_max + 1e-9 ? '#dc2626' : '#16a34a';
        html += `
          <div class="curve-input-row" data-idx="${i}">
            <span class="ci-label">${labels[i]}</span>
            <span class="ci-power-wrap">
              <input type="number" step="0.01" data-series="power_plan" data-idx="${i}" value="${(storage.power_plan[i] ?? 0).toFixed(2)}" oninput="onCurveInputChange(this)" title="正=放电，负=充电">
            </span>
            <span class="ci-soc-wrap" style="color:${socColor};">
              <input type="number" step="0.001" min="0" max="1" data-series="soc" data-idx="${i}" value="${soc.toFixed(4)}" oninput="onCurveInputChange(this)" title="手动输入SOC会自动反推当前时段功率">
              <span>SOC</span>
            </span>
          </div>
        `;
      }
      html += '</div>';
    }
    html += '</div>';
    container.innerHTML = html;
    return;
  }

  // 其他类型（LMP曲线等）保持原样的紧凑网格
  let html = '';
  cfg.series.forEach(s => {
    html += `<div style="margin:8px 0 4px;font-weight:600;color:${s.color};">${s.label} (${s.unit})</div>`;
    html += '<div class="agc-hour-grid">';
    for (let i = 0; i < 96; i++) {
      const label = labels[i] || `${Math.floor(i/4)}:${(i%4)*15}`;
      html += `
        <div class="agc-hour-item">
          <div class="h-label">${label}</div>
          <input type="number" step="0.01" data-series="${s.key}" data-idx="${i}" value="${(storage[s.key][i] ?? 0).toFixed(2)}" oninput="onCurveInputChange(this)">
        </div>`;
    }
    html += '</div>';
  });

  container.innerHTML = html;
}

function updateCurveSocCells() {
  if (CURVE_EDITOR_TYPE !== 'da_bid') return;
  const storage = getCurveStorage('da_bid', CURVE_EDITOR_DATE);

  const storageParams = ALL_DATA.storage || {};

  document.querySelectorAll('input[data-series="soc"]').forEach(input => {

function updateSocInputColor(input, soc) {
  const ratio = CURVE_EDITOR_RATIO || (CURVE_EDITOR_DATE ? getCurrentBatchRatios()[0] : getCurrentSingleRatio());
  const bounds = getSoftBoundsForRatio(ratio);
  const isOut = soc < bounds.soc_soft_min - 1e-9 || soc > bounds.soc_soft_max + 1e-9;
  input.style.color = isOut ? '#dc2626' : '#16a34a';
}

// 根据相邻两个SOC反推该时段需要的净充放电功率（正=放电，负=充电）
function derivePowerFromSoc(prevSoc, newSoc, storage) {
  const capacity = storage.rated_capacity_mwh;
  const hours = 0.25;
  const effC = storage.charging_efficiency;
  const effD = storage.discharging_efficiency;
  const selfDischarge = (storage.self_discharge_rate || 0) * hours * capacity;
  // netDcEnergy > 0 表示需要充电（从电网吸收能量）
  const netDcEnergy = (newSoc - prevSoc) * capacity + selfDischarge;
  if (netDcEnergy > 1e-9) {
    const chargeAc = netDcEnergy / hours / effC;
    return -chargeAc;
  } else if (netDcEnergy < -1e-9) {
    const dischargeAc = -netDcEnergy * effD / hours;
    return dischargeAc;
  }
  return 0;
}

function onCurveInputChange(input) {
  const seriesKey = input.dataset.series;
  const idx = parseInt(input.dataset.idx, 10);
  const storage = getCurveStorage(CURVE_EDITOR_TYPE, CURVE_EDITOR_DATE);
  const storageParams = ALL_DATA.storage || {};
  const initialSoc = getEditorInitialSoc(CURVE_EDITOR_DATE);

  if (seriesKey === 'power_plan') {
    const newValue = parseFloat(input.value) || 0;
    storage.power_plan[idx] = newValue;
    const socList = computeSocFromPowerPlan(storage.power_plan, initialSoc, storageParams);
    document.querySelectorAll('input[data-series="soc"]').forEach(el => {
      const i = parseInt(el.dataset.idx, 10);
      el.value = socList[i].toFixed(4);
      updateSocInputColor(el, socList[i]);
    });
  } else if (seriesKey === 'soc') {
    let newSoc = parseFloat(input.value);
    if (Number.isNaN(newSoc)) newSoc = initialSoc;
    newSoc = Math.max(storageParams.soc_min ?? 0, Math.min(storageParams.soc_max ?? 1, newSoc));
    input.value = newSoc.toFixed(4);
    // 反推当前时段功率，并重新计算后续SOC
    const socList = computeSocFromPowerPlan(storage.power_plan, initialSoc, storageParams);
    socList[idx] = newSoc;
    const prevSoc = idx === 0 ? initialSoc : socList[idx - 1];
    const power = derivePowerFromSoc(prevSoc, newSoc, storageParams);
    storage.power_plan[idx] = power;
    const powerInput = document.querySelector(`input[data-series="power_plan"][data-idx="${idx}"]`);
    if (powerInput) powerInput.value = power.toFixed(2);
    const newSocList = computeSocFromPowerPlan(storage.power_plan, initialSoc, storageParams);
    for (let i = idx; i < 96; i++) {
      const socInput = document.querySelector(`input[data-series="soc"][data-idx="${i}"]`);
      if (socInput) {
        socInput.value = newSocList[i].toFixed(4);
        updateSocInputColor(socInput, newSocList[i]);
      }
    }
  } else {
    const newValue = parseFloat(input.value) || 0;
    storage[seriesKey][idx] = newValue;
  }

  updateCurveChart();
  updateCurveSocStatus();
  updateCurveSocCells();
}

function isCurrentCurveValid(ratio) {
  if (CURVE_EDITOR_TYPE !== 'da_bid') return { valid: true };
  const storage = getCurveStorage('da_bid', CURVE_EDITOR_DATE);
  if (storage.source !== 'custom' || !storage.power_plan || storage.power_plan.length !== 96) return { valid: true };
  const storageParams = ALL_DATA.storage || {};
  const initialSoc = getEditorInitialSoc(CURVE_EDITOR_DATE);
  const socList = computeSocFromPowerPlan(storage.power_plan, initialSoc, storageParams);
  if (ratio == null) ratio = CURVE_EDITOR_RATIO || (CURVE_EDITOR_DATE ? getCurrentBatchRatios()[0] : getCurrentSingleRatio());
  return validateSocBoundsForRatio(socList, ratio);
}

function setCurveValueAt(seriesKey, index, value) {
  const storage = getCurveStorage(CURVE_EDITOR_TYPE, CURVE_EDITOR_DATE);
  storage[seriesKey][index] = value;
}

// 根据拖拽后的 SOC 反推当前时段功率，更新 power_plan
function setSocValueAt(index, newSoc) {
  if (CURVE_EDITOR_TYPE !== 'da_bid') return;
  const storage = getCurveStorage('da_bid', CURVE_EDITOR_DATE);
  if (!storage.power_plan || storage.power_plan.length !== 96) return;
  const storageParams = ALL_DATA.storage || {};
  const initialSoc = getEditorInitialSoc(CURVE_EDITOR_DATE);
  const capacity = storageParams.rated_capacity_mwh || 1;
  const hours = 0.25;
  const etaC = storageParams.charging_efficiency || 1;
  const etaD = storageParams.discharging_efficiency || 1;
  const selfDischargeMwh = (storageParams.self_discharge_rate || 0) * hours * capacity;

  // 限制在物理硬边界内
  const socMin = storageParams.soc_min ?? 0;
  const socMax = storageParams.soc_max ?? 1;
  newSoc = Math.max(socMin, Math.min(socMax, newSoc));

  // 获取上一时段末 SOC（基于当前功率计划）
  let prevSoc;
  if (index === 0) {
    prevSoc = initialSoc;
  } else {
    const socList = computeSocFromPowerPlan(storage.power_plan, initialSoc, storageParams);
    prevSoc = socList[index - 1];
  }

  // 需要的直流侧净能量：充电为正，放电为负
  const delta = (newSoc - prevSoc) * capacity + selfDischargeMwh;

  let power;
  if (delta > 1e-9) {
    // 充电：power 为负
    power = -delta / (hours * etaC);
  } else if (delta < -1e-9) {
    // 放电：power 为正
    power = (-delta) * etaD / hours;
  } else {
    power = 0;
  }

  // 限制在额定功率内，避免图表过于离谱
  const maxPower = storageParams.rated_power_mw || 1000;
  power = Math.max(-maxPower, Math.min(maxPower, power));

  storage.power_plan[index] = power;
}

        borderColor: '#7c3aed',
        backgroundColor: 'rgba(124,58,237,0.12)',
        borderWidth: 2,
        pointRadius: 3,
        pointHoverRadius: 5,
        fill: false,
        tension: 0,
        yAxisID: 'y-soc',
      });
    } else if (ALL_DATA.dayAhead?.intervals?.length === 96) {
      // 缓存尚未加载，先 fallback 到默认日前数据
      const baseDA = ALL_DATA.dayAhead;
      const optPower = baseDA.intervals.map(d => d.win_discharge_mw - d.win_charge_mw);
      const optSoc = baseDA.intervals.map(d => d.soc);

        label: '优化功率',
        data: optPower,
        borderColor: '#2563eb',
        backgroundColor: 'rgba(37,99,235,0.12)',
        borderWidth: 2,
        pointRadius: 3,
        pointHoverRadius: 5,
        fill: false,
        tension: 0,
        yAxisID: 'y',
      });
      datasets.push({
        label: '优化SOC',
        data: optSoc,
        borderColor: '#7c3aed',
        backgroundColor: 'rgba(124,58,237,0.12)',
        borderWidth: 2,
        pointRadius: 3,
        pointHoverRadius: 5,
        fill: false,
        tension: 0,
        yAxisID: 'y-soc',
      });
    }
  } else {
    datasets.push(...cfg.series.map(s => ({
      label: s.label,
      data: storage[s.key].slice(),
      borderColor: s.color,
      backgroundColor: s.color + '20',
      borderWidth: 2,
      pointRadius: 4,
      pointHoverRadius: 7,
      pointBackgroundColor: s.color,
      fill: false,
      tension: 0,
      yAxisID: 'y',
    })));

    // 日前中标自定义模式下叠加 SOC 轨迹（紫色）
    if (CURVE_EDITOR_TYPE === 'da_bid' && storage.source === 'custom' && storage.power_plan?.length === 96) {
      const socList = computeSocFromPowerPlan(storage.power_plan, initialSoc, storageParams);
      datasets.push({
        label: '计算SOC',
        data: socList,
        borderColor: '#7c3aed',
        backgroundColor: 'rgba(124,58,237,0.12)',
        borderWidth: 2,
        pointRadius: 3,
        pointHoverRadius: 5,
        fill: false,
        tension: 0,
        yAxisID: 'y-soc',
      });
    }
  }

  if (curveEditorChart) {
    curveEditorChart.data.labels = labels;
    curveEditorChart.data.datasets = datasets;
    curveEditorChart.update('none');
  } else {
    const scales = {
      x: { ticks: { maxTicksLimit: 24, font: { size: 10 } }, grid: { display: false } },
      y: { position: 'left', title: { display: true, text: '功率 (MW)', font: { size: 11 } }, grid: { color: 'rgba(37,99,235,0.08)' } },

        plugins: {
          legend: { display: true, labels: { usePointStyle: true, font: { size: 11 } } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}` } },
          dragData: (CURVE_EDITOR_TYPE === 'da_bid' && storage.source === 'optimize') ? false : {
            round: 2,

                const s = cfg.series[datasetIndex];
                if (!s) return;
                setCurveValueAt(s.key, index, value);
              }
              updateCurveChart();
              updateCurveSocStatus();
              updateCurveSocCells();
            },
            onDragEnd: function(e, datasetIndex, index, value) {
              if (CURVE_EDITOR_TYPE === 'da_bid') {
                if (datasetIndex === 0) {
                  setCurveValueAt('power_plan', index, value);
                } else if (datasetIndex === 1) {
                  setSocValueAt(index, value);
                } else {
                  return;
                }
              } else {
                const s = cfg.series[datasetIndex];
                if (!s) return;
                setCurveValueAt(s.key, index, value);
              }
              renderCurveEditorInputs();
              updateCurveChart();
              updateCurveSocStatus();
              updateCurveSocCells();
            },
          },
        },
      },
    });
  }
}

async function saveCurvePreset() {
  const storage = getCurveStorage(CURVE_EDITOR_TYPE, CURVE_EDITOR_DATE);
  if (CURVE_EDITOR_TYPE === 'da_bid' && storage.source === 'optimize') {
    alert('当前为“按日前LMP优化”模式，无法保存自定义曲线预设。如需保存，请先在上方切换为“自定义充放电曲线”。');
    return;
  }
  const name = document.getElementById('curve-save-name').value.trim();
  if (!name) { alert('请输入曲线名称'); return; }
  const v = isCurrentCurveValid();
  if (!v.valid) {
    alert(`当前曲线无法保存：第 ${v.index + 1} 个时段 SOC=${v.soc.toFixed(4)} 超出软边界 [${v.min}, ${v.max}]，请调整后再保存。`);
    return;
  }
  const cfg = getCurveEditorConfig(CURVE_EDITOR_TYPE);
  const data = {};
  cfg.series.forEach(s => data[s.key] = storage[s.key].slice());
  // 日前中标曲线是完整计划，保存时一并记录生成该曲线使用的初始 SOC
  if (CURVE_EDITOR_TYPE === 'da_bid') {
    data.initial_soc = getEditorInitialSoc(CURVE_EDITOR_DATE);
  }
  try {
    const resp = await fetch('/api/curve/save', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, type: CURVE_EDITOR_TYPE, data }),
    });
    const result = await resp.json();
    if (result.error) throw new Error(result.error);
    alert('保存成功');
    await refreshCurvePresetList();
  } catch (e) { alert('保存失败: ' + e.message); }
}

async function refreshCurvePresetList() {
  try {

async function loadCurvePreset() {
  const name = document.getElementById('curve-load-select').value;
  if (!name) return;
  try {
    const resp = await fetch('/api/curve/load?name=' + encodeURIComponent(name));
    const result = await resp.json();
    if (result.error) throw new Error(result.error);
    const cfg = getCurveEditorConfig(CURVE_EDITOR_TYPE);
    const storage = getCurveStorage(CURVE_EDITOR_TYPE, CURVE_EDITOR_DATE);
    cfg.series.forEach(s => {
      let arr = (result.data?.[s.key] || []).map(v => parseFloat(v) || 0);
      if (arr.length < 96) arr = arr.concat(new Array(96 - arr.length).fill(0));
      storage[s.key] = arr.slice(0, 96);
    });
    // 加载预设后自动视为自定义
    if (CURVE_EDITOR_TYPE === 'da_bid') {
      storage.source = 'custom';
      const sourceSel = document.getElementById('curve-bid-source');
      if (sourceSel) sourceSel.value = 'custom';
      const bidInfo = document.getElementById('curve-bid-info');
      if (bidInfo) bidInfo.textContent = '当前模式：自定义充放电功率曲线（正=放电，负=充电），SOC自动计算，超出软边界将被驳回。';
      // 加载曲线绑定的初始SOC，并同步到对应回测配置
      if (result.data?.initial_soc != null) {
        const loadedInitialSoc = parseFloat(result.data.initial_soc);
        if (!CURVE_EDITOR_DATE) {
          const el = document.getElementById('sbt-initial-soc');
          if (el) {
            el.value = loadedInitialSoc.toFixed(2);
            el.dispatchEvent(new Event('input'));
          }
        } else {
          if (!BATCH_DAILY_CONFIGS[CURVE_EDITOR_DATE]) {
            BATCH_DAILY_CONFIGS[CURVE_EDITOR_DATE] = {
              agc_source: 'historical',
              commands: null,
              hourly: false,
              seed: 42,
              initial_soc_choice: 'custom',
              initial_soc_value: loadedInitialSoc,
            };
          } else {
            BATCH_DAILY_CONFIGS[CURVE_EDITOR_DATE].initial_soc_choice = 'custom';
            BATCH_DAILY_CONFIGS[CURVE_EDITOR_DATE].initial_soc_value = loadedInitialSoc;
          }
        }
      }
    }
    renderCurveEditorInputs();
    updateCurveChart();
    updateCurveSocStatus();
  } catch (e) { alert('读取失败: ' + e.message); }
}

async function deleteCurvePreset() {
  const name = document.getElementById('curve-load-select').value;
  if (!name) return;
  if (!confirm(`确定删除曲线 "${name}" 吗？`)) return;
  try {
    const resp = await fetch('/api/curve/delete', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const result = await resp.json();
    if (result.error) throw new Error(result.error);
    await refreshCurvePresetList();
  } catch (e) { alert('删除失败: ' + e.message); }
}

function getValidBidOverride(date, ratio) {
  const bid = getBidOverride(date, ratio);
  if (bid.source !== 'custom' || !bid.power_plan || bid.power_plan.length !== 96) return null;
  const storageParams = ALL_DATA.storage || {};
  // 自定义曲线已绑定初始SOC，优先使用曲线中的值；否则使用编辑器当前初始SOC
  const initialSoc = bid.initial_soc != null ? bid.initial_soc : getEditorInitialSoc(date);
  const socList = computeSocFromPowerPlan(bid.power_plan, initialSoc, storageParams);
  const v = validateSocBoundsForRatio(socList, ratio);
  if (!v.valid) {
    return { valid: false, ...v };
  }
  return { valid: true, power_plan: bid.power_plan.slice(), initial_soc: initialSoc };
}

async function runSingleBacktest() {
  const date = document.getElementById('sbt-date').value;
  const ratio = parseFloat(document.getElementById('sbt-ratio').value);
  const mode = document.getElementById('sbt-mode').value;
  const rtMode = document.getElementById('sbt-rt-mode').value;
  const useMpc = rtMode === 'mpc';
  const agcSource = document.getElementById('sbt-agc-source').value;
  const agcHourly = document.getElementById('sbt-agc-hourly').checked;
  const agcSeed = parseInt(document.getElementById('sbt-agc-seed').value || '42', 10);
  const configId = document.getElementById('vpp-selector')?.value || 'overall';
  const initialSoc = parseFloat(document.getElementById('sbt-initial-soc').value || '0.5');

  const resultArea = document.getElementById('sbt-result');
  const loadingText = useMpc ? '⏳ 正在运行回测（滚动 MPC），约需 2~3 秒...' : '⏳ 正在运行回测（全局 hindsight），约需 0.5 秒...';
  resultArea.innerHTML = `<div class="card full-width"><div class="loading">${loadingText}</div></div>`;
  document.getElementById('sbt-run').disabled = true;

  const payload = {
    date, agc_ratio: ratio, mode, use_mpc: useMpc,
    agc_source: agcSource,
    agc_hourly: agcHourly,
    agc_seed: agcSeed,
    config_id: configId,
    initial_soc: initialSoc,
  };
  if (agcSource === 'manual') {
    if (!window._manualAgcCommands || window._manualAgcCommands.length !== 96) {
      resultArea.innerHTML = `<div class="card full-width"><div class="error">请先点击"编辑 AGC 曲线"并设置 96 点 AGC 指令</div></div>`;
      document.getElementById('sbt-run').disabled = false;
      return;
    }
    payload.agc_commands = window._manualAgcCommands;
  }

  // 自定义 LMP 与日前中标曲线
  if (SINGLE_OVERRIDES.lmp.da_values?.length === 96 || SINGLE_OVERRIDES.lmp.rt_values?.length === 96) {
    payload.lmp_overrides = {};
    if (SINGLE_OVERRIDES.lmp.da_values?.length === 96) {
      payload.lmp_overrides.da_source = 'custom';
      payload.lmp_overrides.da_values = SINGLE_OVERRIDES.lmp.da_values;
    }
    if (SINGLE_OVERRIDES.lmp.rt_values?.length === 96) {
      payload.lmp_overrides.rt_source = 'custom';
      payload.lmp_overrides.rt_values = SINGLE_OVERRIDES.lmp.rt_values;
    }
  }
  const bidCheck = getValidBidOverride(null, ratio);
  if (bidCheck) {
    if (!bidCheck.valid) {
      resultArea.innerHTML = `<div class="card full-width"><div class="error">日前中标曲线校验失败：第 ${bidCheck.index + 1} 个时段 SOC=${bidCheck.soc.toFixed(4)} 超出软边界 [${bidCheck.min}, ${bidCheck.max}]，请重新编辑。</div></div>`;
      document.getElementById('sbt-run').disabled = false;
      return;
    }
    payload.bid_overrides = { source: 'custom', power_plan: bidCheck.power_plan, initial_soc: bidCheck.initial_soc };
    // 自定义曲线是完整计划，回测时必须使用曲线绑定的初始SOC
    payload.initial_soc = bidCheck.initial_soc;
  }

  const startMs = performance.now();
  try {
    console.log('[回测] 发送请求:', payload);
    const resp = await fetch('/api/backtest/single_day', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    console.log('[回测] 响应状态:', resp.status, resp.url);
    if (!resp.ok) {
      const text = await resp.text();
      console.error('[回测] 响应内容:', text);
      throw new Error(`服务器返回 ${resp.status}: ${text.slice(0, 200)}`);
    }
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    data.elapsed_ms = performance.now() - startMs;
    SINGLE_BACKTEST_RESULT = data;
    renderSingleBacktestResult(data);
  } catch (e) {
    console.error('[回测] 失败:', e);
    resultArea.innerHTML = `<div class="card full-width"><div class="error">回测失败: ${e.message}</div></div>`;
  } finally {
    document.getElementById('sbt-run').disabled = false;
  }
}

  (function(){

        {name:'实际充电',type:'bar',stack:'rt',data:rtData.chg,itemStyle:{color:COLORS.green}},

  };
}

function getAnalyticsSelectedDates() {
  const st = getAnalyticsState();
  let start, end;
  const y = parseInt(st.year);
  if (st.scope === 'year') {
    start = `${st.year}-01-01`;
    end = `${st.year}-12-31`;
  } else {
    const m = parseInt(st.month);
    const daysInMonth = new Date(y, m, 0).getDate();
    start = `${st.year}-${st.month}-01`;
    end = `${st.year}-${st.month}-${String(daysInMonth).padStart(2, '0')}`;
  }

  const dates = [];
  const cur = new Date(start + 'T00:00:00');
  const last = new Date(end + 'T00:00:00');
  while (cur <= last) {
    const jsDay = cur.getDay();
    const pyDay = (jsDay + 6) % 7;
    if (st.weekdays.includes(pyDay)) {
      const yy = cur.getFullYear();
      const mm = String(cur.getMonth() + 1).padStart(2, '0');
      const dd = String(cur.getDate()).padStart(2, '0');
      dates.push(`${yy}-${mm}-${dd}`);
    }
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}

async function loadAnalyticsData(yearMonth, year, selectedDates, impute, groupBy, method) {
  const resp = await fetch('/api/analytics/by_selected_days', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      selected_dates: selectedDates,
      year_month: yearMonth,
      year: year,
      impute: impute,
      group_by: groupBy,
      method: method,
    }),
  });
  ANALYTICS_DATA = await resp.json();
  return ANALYTICS_DATA;
}

async function exportExcel(reportType, params = {}) {
  try {
    const body = { report_type: reportType, ...params };
    if (!body.output_path) {
      const suffix = reportType === 'daily' ? params.date : reportType === 'monthly' ? params.year_month : params.year;
      body.output_path = `data/output/reports/${suffix}_${reportType}.xlsx`;
    }
    if (ANALYTICS_DATA && (reportType === 'monthly' || reportType === 'annual')) {
      body.sample_rows = ANALYTICS_DATA.breakdown?.daily || [];
      body.ranking = ANALYTICS_DATA.ranking || null;
    }
    const resp = await fetch('/api/export/excel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const result = await resp.json();
    if (result.error) throw new Error(result.error);
    const a = document.createElement('a');
    a.href = result.download_url;
    a.download = result.output_path.split('/').pop();
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch (e) {
    alert('导出失败: ' + e.message);
  }
}

async function refreshAnalytics() {
  const resultsContainer = document.getElementById('analytics-results');
  if (resultsContainer) {
    resultsContainer.innerHTML = '<div class="loading">⏳ 加载分析中...</div>';
  } else {
    document.getElementById('analytics-content').innerHTML = '<div class="loading">⏳ 加载分析中...</div>';
  }

  const st = getAnalyticsState();
  const selectedDates = getAnalyticsSelectedDates();
  const yearMonth = `${st.year}-${st.month}`;

  try {
    const { breakdown, ranking, monthly, annual } = await loadAnalyticsData(
      yearMonth, st.year, selectedDates, st.impute, st.groupBy, st.method
    );
    if (breakdown.error || ranking.error || monthly.error || annual.error) {
      const target = resultsContainer || document.getElementById('analytics-content');
      target.innerHTML = `<div class="error">加载失败: ${breakdown.error || ranking.error || monthly.error || annual.error}</div>`;
      return;
    }
    renderAnalyticsContent(breakdown, ranking, monthly, annual, st, selectedDates);
  } catch (err) {
    const target = resultsContainer || document.getElementById('analytics-content');
    target.innerHTML = `<div class="error">加载分析失败: ${err.message}</div>`;
  }
}

  items.forEach(it => {
    html += `<tr>
      <td style="text-align:center;font-weight:bold;color:#2563eb;">${it.rank}</td>
      <td style="text-align:left;">${it.name}</td>
      <td>${fmtNum(it.rated_power_mw, 2)}</td>
      <td class="${it.net_profit >= 0 ? 'pos' : 'neg'}">¥${fmt(it.net_profit)}</td>
      <td class="${it.net_profit_per_mw >= 0 ? 'pos' : 'neg'}">¥${fmt(it.net_profit_per_mw)}</td>
      <td>${fmtNum(it.share_pct, 2)}%</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('analytics-ranking-table').innerHTML = html;

  (function(){
    const chart = initChart('analytics-ranking-bar');
    const sorted = [...items].reverse();
    chart.setOption({
      tooltip:{trigger:'axis',axisPointer:{type:'shadow'},formatter:p=>{
        const d = p[0];

      xAxis:{type:'value',name:'元/MW',nameTextStyle:{color:'#64748b'},axisLabel:{color:'#64748b'},splitLine:{lineStyle:{color:'rgba(37,99,235,0.12)'}}},
      yAxis:{type:'category',data:sorted.map(d=>d.name),axisLabel:{color:'#64748b',fontSize:11}},
      series:[{
        type:'bar',data:sorted.map(d=>d.net_profit_per_mw),
        itemStyle:{color:function(p){return p.value>=0?COLORS.green:COLORS.red;}},
        label:{show:true,position:'right',formatter:p=>`¥${fmt(p.value)}`,color:'#64748b',fontSize:10},
      }]

  })();
}

// ===== 切换日期 =====
async function switchDate(dateStr) {
  if (dateStr === currentDate) return;
  disposeCharts();
  document.getElementById('profit-content').innerHTML = '<div class="loading">⏳ 加载中...</div>';
  await loadVppScenarioData();
  updateHeader();
  // 重绘当前页面
  switchPage(currentPage);
}

// ===== 切换场景 =====
async function switchScenario(scenario) {
  if (scenario === currentScenario) return;
  disposeCharts();
  document.getElementById('profit-content').innerHTML = '<div class="loading">⏳ 加载中...</div>';
  currentScenario = scenario;
  await loadVppScenarioData();
  updateHeader();
  switchPage(currentPage);
}

// ===== 主流程 =====
(async function main() {
  // 加载共享数据
  await loadSharedData();

  // 初始化日期选择器
  const sel = document.getElementById('date-selector');
  AVAILABLE_DATES.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    sel.appendChild(opt);
  });
  // 默认选最新日期
  const defaultDate = AVAILABLE_DATES[AVAILABLE_DATES.length - 1];
  sel.value = defaultDate;
  sel.addEventListener('change', () => switchDate(sel.value));

  // 初始化场景选择器
  const scenarioSel = document.getElementById('scenario-selector');
  scenarioSel.addEventListener('change', () => switchScenario(scenarioSel.value));

  // 加载默认日期数据（根据当前 VPP 选择器决定使用整体数据还是单个 VPP 数据）
  await loadVppScenarioData();
  updateHeader();
  renderProfitPage();

  // Tab切换事件
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const pageId = btn.dataset.page;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      currentPage = pageId;
      disposeCharts();
      switchPage(pageId);
    });
  });
})();
